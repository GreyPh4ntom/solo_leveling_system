<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLO LEVELING SYSTEM | PROTOCOL v4.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        
        :root {
            --system-blue: #00f0ff;
            --system-glow: rgba(0, 240, 255, 0.7);
            --shadow-purple: #9d4edd;
            --alert-red: #ff0040;
            --success-cyan: #00ffcc;
            --warning-orange: #ff8800;
            --system-bg: #05080f;
            --system-panel: rgba(8, 15, 35, 0.95);
            --system-border: rgba(0, 240, 255, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--system-bg);
            color: #e0f7ff;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 20%, rgba(157, 78, 221, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, #05080f 0%, #0a0f1f 100%);
        }

        /* Enhanced frame & scan effects */
        .system-frame {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
            border: 2px solid var(--system-blue);
            box-shadow: 0 0 40px var(--system-glow);
            opacity: 0.6;
        }

        .scan-lines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 3px,
                rgba(0, 240, 255, 0.06) 3px,
                rgba(0, 240, 255, 0.06) 6px
            );
            pointer-events: none;
            z-index: 999;
            animation: scanMove 8s linear infinite;
        }

        @keyframes scanMove { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        .system-header {
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.12), transparent);
            border-bottom: 2px solid var(--system-border);
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .hunter-avatar {
            width: 64px;
            height: 64px;
            border: 3px solid var(--system-blue);
            border-radius: 50%;
            background: rgba(0, 240, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 0 25px var(--system-glow);
            position: relative;
        }

        .hunter-avatar::after {
            content: '';
            position: absolute;
            inset: -8px;
            border: 2px solid var(--system-blue);
            border-radius: 50%;
            animation: pulseRing 2.5s infinite ease-in-out;
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 0; }
        }

        .hunter-details h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--system-blue);
            text-shadow: 0 0 15px var(--system-glow);
        }

        .resource-box {
            background: rgba(10, 25, 50, 0.7);
            border: 1px solid var(--system-border);
            padding: 10px 18px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .resource-box:hover {
            border-color: var(--system-blue);
            box-shadow: 0 0 20px var(--system-glow);
            transform: translateY(-2px);
        }

        .main-container {
            max-width: 1480px;
            margin: 0 auto;
            padding: 25px;
            display: grid;
            grid-template-columns: 300px 1fr 400px;
            gap: 25px;
        }

        .system-panel {
            background: var(--system-panel);
            border: 1px solid var(--system-border);
            border-radius: 10px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .panel-header {
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.15), rgba(157, 78, 221, 0.1));
            padding: 14px 24px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--system-border);
        }

        .level-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 5.2rem;
            font-weight: 900;
            line-height: 1;
            color: var(--system-blue);
            text-shadow: 
                0 0 20px var(--system-glow),
                0 0 40px rgba(157, 78, 221, 0.4);
        }

        .xp-bar-wrapper {
            height: 10px;
            background: #0a1428;
            border: 1px solid var(--system-border);
            border-radius: 999px;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00aaff, #00f0ff, #9d4edd);
            box-shadow: 0 0 15px var(--system-glow);
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .bar-fill {
            transition: width 0.5s ease;
        }

        .quest-card {
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .quest-card:hover:not(.completed):not(.blocked) {
            transform: translateX(8px);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
        }

        .btn-system {
            position: relative;
            overflow: hidden;
        }

        .btn-system::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 40%;
            height: 300%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.4),
                transparent
            );
            transform: skewX(-25deg);
            animation: btnShine 4s infinite;
        }

        @keyframes btnShine {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(400%) skewX(-25deg); }
        }

        .stat-row {
            transition: all 0.2s;
        }

        .stat-row:hover {
            background: rgba(0, 240, 255, 0.08) !important;
        }

        /* Body visual improvements */
        .body-part {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .body-part:hover {
            filter: drop-shadow(0 0 20px currentColor) brightness(1.4);
            transform: scale(1.08);
        }
    </style>
</head>
<body>
    <div class="system-frame"></div>
    <div class="scan-lines"></div>

    <header class="system-header">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="hunter-avatar">🪓</div>
            <div>
                <h1 id="hunterName">SHADOW MONARCH</h1>
                <div id="hunterTitle" style="color: #9d4edd; font-size: 0.9rem; letter-spacing: 2px;">THE ONE WHO RISES</div>
            </div>
        </div>

        <div style="display: flex; gap: 16px;">
            <div class="resource-box" onclick="openGoldModal()">
                <span style="font-size: 1.4rem;">🪙</span>
                <div>
                    <div id="goldDisplay" style="font-family: Orbitron; font-size: 1.3rem; color: #ffd700;">0</div>
                    <div style="font-size: 0.7rem; opacity: 0.7;">GOLD</div>
                </div>
            </div>
            <div class="resource-box">
                <span style="font-size: 1.4rem;">🔥</span>
                <div>
                    <div id="streakDisplay" style="font-family: Orbitron; font-size: 1.3rem;">0</div>
                    <div style="font-size: 0.7rem; opacity: 0.7;">STREAK</div>
                </div>
            </div>
            <div class="resource-box">
                <span style="font-size: 1.4rem;">⚡</span>
                <div>
                    <div id="disciplineDisplay" style="font-family: Orbitron; font-size: 1.3rem; color: #00ffcc;">100</div>
                    <div style="font-size: 0.7rem; opacity: 0.7;">DISCIPLINE</div>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Body Status -->
        <div class="system-panel">
            <div class="panel-header">◇ BODY STATUS</div>
            <div class="panel-content" style="padding: 25px; text-align: center;">
                <div style="position: relative; height: 420px; margin: 0 auto;">
                    <svg width="200" height="420" viewBox="0 0 200 420" style="filter: drop-shadow(0 0 15px #00f0ff);">
                        <!-- Improved body SVG with better proportions -->
                        <circle class="body-part status-normal" data-part="head" cx="100" cy="45" r="28"/>
                        <rect class="body-part status-normal" data-part="neck" x="85" y="72" width="30" height="22" rx="8"/>
                        <ellipse class="body-part status-normal" data-part="shoulders" cx="68" cy="105" rx="32" ry="18"/>
                        <ellipse class="body-part status-normal" data-part="shoulders" cx="132" cy="105" rx="32" ry="18"/>
                        <rect class="body-part status-normal" data-part="chest" x="65" y="115" width="70" height="55" rx="15"/>
                        <rect class="body-part status-normal" data-part="abs" x="72" y="170" width="56" height="65" rx="10"/>
                        <!-- Arms -->
                        <rect class="body-part status-normal" data-part="arms" x="32" y="118" width="25" height="68" rx="10" transform="rotate(-25 45 145)"/>
                        <rect class="body-part status-normal" data-part="arms" x="143" y="118" width="25" height="68" rx="10" transform="rotate(25 155 145)"/>
                        <!-- Legs -->
                        <rect class="body-part status-normal" data-part="legs" x="68" y="235" width="28" height="95" rx="12"/>
                        <rect class="body-part status-normal" data-part="legs" x="104" y="235" width="28" height="95" rx="12"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Main Status Window -->
        <div class="system-panel">
            <div class="panel-header">STATUS WINDOW</div>
            <div class="panel-content" style="padding: 25px;">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div class="level-number" id="levelDisplay">1</div>
                    <div id="rankDisplay" style="font-size: 1.4rem; color: #00ffcc; letter-spacing: 4px; margin-top: -10px;">E-RANK</div>
                </div>

                <div class="xp-bar-wrapper"><div class="xp-bar-fill" id="xpBar" style="width: 0%"></div></div>
                <div style="text-align: center; margin: 8px 0; font-size: 0.85rem; opacity: 0.8;" id="xpText">0 / 100 XP</div>

                <div style="display: flex; justify-content: space-between; margin: 20px 0 10px;">
                    <div style="color: #00ffcc;" id="jobDisplay">Novice Hunter</div>
                    <div onclick="allocateStatPoints()" style="cursor: pointer; background: rgba(157,78,221,0.2); padding: 4px 12px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #9d4edd;" id="apContainer">
                        AP: <span id="apValue">0</span>
                    </div>
                </div>

                <!-- Resource Bars -->
                <div style="display: flex; flex-direction: column; gap: 16px;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="font-size: 1.5rem; width: 30px;">❤️</span>
                        <div style="flex: 1; position: relative;">
                            <div class="xp-bar-wrapper"><div class="bar-fill hp-fill" id="hpBar" style="width: 100%; background: linear-gradient(90deg, #ff0040, #ff4080);"></div></div>
                            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.8rem; font-weight: 600;" id="hpText">100/100</div>
                        </div>
                    </div>
                    <!-- Similar for MP and Fatigue -->
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="font-size: 1.5rem; width: 30px;">💧</span>
                        <div style="flex: 1; position: relative;">
                            <div class="xp-bar-wrapper"><div class="bar-fill mp-fill" id="mpBar" style="width: 100%; background: linear-gradient(90deg, #0066ff, #00f0ff);"></div></div>
                            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.8rem; font-weight: 600;" id="mpText">100/100</div>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="font-size: 1.5rem; width: 30px;">⚡</span>
                        <div style="flex: 1; position: relative;">
                            <div class="xp-bar-wrapper"><div class="bar-fill fatigue-fill" id="fatigueBar" style="width: 0%; background: linear-gradient(90deg, #ff8800, #ffaa00);"></div></div>
                            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.8rem; font-weight: 600;" id="fatigueText">0/100</div>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div style="margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;" id="statsContainer">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <!-- Daily Protocol -->
        <div class="system-panel">
            <div class="panel-header">DAILY PROTOCOL <span id="phaseIndicator" style="margin-left: auto; font-size: 0.75rem; padding: 2px 10px; border-radius: 20px;"></span></div>
            <div class="panel-content" style="padding: 20px;">
                <div id="fatigueWarning" style="display: none; background: rgba(255,0,64,0.15); border: 1px solid #ff0040; color: #ff4080; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
                    ⚠️ FATIGUE CRITICAL — PRIORITIZE RECOVERY
                </div>

                <div id="protocolContainer"></div>

                <button onclick="generateDailyProtocol()" class="btn-system" style="width: 100%; margin-top: 20px; padding: 14px; font-size: 0.95rem; background: rgba(157,78,221,0.2); border: 1px solid #9d4edd; color: #c4a1ff;">
                    🔄 GENERATE NEW PROTOCOL
                </button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1500; display: none; align-items: center; justify-content: center;">
        <div id="systemAlert" style="background: #0a1428; border: 2px solid #00f0ff; border-radius: 12px; padding: 35px; max-width: 460px; width: 90%; text-align: center; box-shadow: 0 0 60px rgba(0,240,255,0.5);">
            <!-- Dynamic content -->
        </div>
    </div>

    <script>
        // === CORE DATA ===
        let hunter = {
            name: "Shadow Monarch",
            level: 1,
            xp: 0,
            rank: "E",
            job: "Novice Hunter",
            gold: 0,
            streak: 0,
            discipline: 100,
            hp: 100, maxHp: 100,
            mp: 100, maxMp: 100,
            fatigue: 0,
            stats: { str: 12, vit: 12, agi: 10, int: 10, per: 8 },
            ap: 0,
            bodyStatus: {
                head: {status: 'normal', fatigue: 0},
                neck: {status: 'normal', fatigue: 0},
                shoulders: {status: 'normal', fatigue: 0},
                chest: {status: 'normal', fatigue: 0},
                abs: {status: 'normal', fatigue: 0},
                arms: {status: 'normal', fatigue: 0},
                legs: {status: 'normal', fatigue: 0}
            },
            dailyProtocol: null,
            lastReset: null
        };

        const PHASES = [
            {name: "FOUNDATION", min: 1, max: 100, color: "#00ff88"},
            {name: "ADAPTATION", min: 101, max: 250, color: "#00f0ff"},
            {name: "SPECIALIZATION", min: 251, max: 450, color: "#9d4edd"},
            {name: "INTENSIFICATION", min: 451, max: 700, color: "#ff6b35"},
            {name: "MASTERY", min: 701, max: 900, color: "#ffd700"},
            {name: "ASCENSION", min: 901, max: 1000, color: "#ff0040"}
        ];

        const RANKS = [
            {name: "E", level: 1, title: "Novice Hunter"},
            {name: "D", level: 20, title: "Awakened Hunter"},
            {name: "C", level: 40, title: "Seasoned Hunter"},
            {name: "B", level: 65, title: "Elite Hunter"},
            {name: "A", level: 90, title: "National Level"},
            {name: "S", level: 120, title: "Shadow Monarch"}
        ];

        // Quest templates (expanded)
        const QUEST_DB = {
            strength: ["Push-up Protocol", "Deadlift Dominion", "Bench Press Assault", "Core Crusher"],
            agility: ["Sprint Intervals", "Shadow Dodge Drill", "Parkour Flow", "Reaction Training"],
            intelligence: ["Deep Study", "Tactical Analysis", "Skill Journaling", "Strategic Planning"],
            recovery: ["Active Recovery", "Meditation Ritual", "Cold Exposure", "Full Rest Protocol"]
        };

        function saveData() {
            localStorage.setItem('soloLeveling_v4', JSON.stringify(hunter));
        }

        function loadData() {
            const saved = localStorage.getItem('soloLeveling_v4');
            if (saved) hunter = {...hunter, ...JSON.parse(saved)};
        }

        function getXPRequired(level) {
            return Math.floor(120 * Math.pow(level, 1.6));
        }

        function getCurrentPhase() {
            return PHASES.find(p => hunter.level >= p.min && hunter.level <= p.max) || PHASES[0];
        }

        function getCurrentRank() {
            return RANKS.findLast(r => hunter.level >= r.level) || RANKS[0];
        }

        function levelUp() {
            hunter.level++;
            hunter.ap += 6;
            hunter.maxHp += 8;
            hunter.maxMp += 5;
            hunter.hp = hunter.maxHp;
            hunter.mp = hunter.maxMp;

            const newRank = getCurrentRank();
            if (newRank.name !== hunter.rank) {
                hunter.rank = newRank.name;
                hunter.job = newRank.title;
                showAlert(`<span style="color:#ffd700">RANK UP!</span><br>${newRank.title}`, [
                    {icon: '👑', value: newRank.name + '-RANK', label: 'NEW RANK'}
                ]);
            }
        }

        function addXP(amount) {
            hunter.xp += Math.floor(amount * (hunter.discipline > 85 ? 1.15 : 1));
            while (hunter.xp >= getXPRequired(hunter.level)) {
                hunter.xp -= getXPRequired(hunter.level);
                levelUp();
            }
            updateUI();
        }

        function allocateStatPoints() {
            if (hunter.ap <= 0) return showAlert("NO AVAILABLE STAT POINTS", []);
            
            const stat = prompt("Which stat to increase?\n(str, vit, agi, int, per)", "str");
            const validStats = ['str','vit','agi','int','per'];
            if (!validStats.includes(stat)) return;

            const points = parseInt(prompt("How many points? (max " + hunter.ap + ")", "1")) || 1;
            if (points > hunter.ap || points < 1) return;

            hunter.stats[stat] += points;
            hunter.ap -= points;
            showAlert(`STAT ALLOCATED<br>+${points} ${stat.toUpperCase()}`, []);
            saveData();
            updateUI();
        }

        function generateDailyProtocol() {
            const protocol = {
                date: new Date().toDateString(),
                quests: []
            };

            Object.keys(QUEST_DB).forEach(cat => {
                const quests = QUEST_DB[cat];
                const name = quests[Math.floor(Math.random()*quests.length)];
                const base = 15 + hunter.level * 2;
                
                protocol.quests.push({
                    id: Date.now() + Math.random(),
                    category: cat,
                    name: name,
                    target: Math.floor(base * (cat === 'recovery' ? 0.6 : 1)),
                    fatigue: cat === 'recovery' ? -25 : 22 + Math.floor(hunter.level * 0.8),
                    rewards: {
                        xp: 60 + Math.floor(hunter.level * 9),
                        gold: 8 + Math.floor(hunter.level / 3),
                        stat: cat === 'strength' ? 'str' : cat === 'agility' ? 'agi' : cat === 'intelligence' ? 'int' : 'vit'
                    },
                    completed: false
                });
            });

            hunter.dailyProtocol = protocol;
            saveData();
            updateUI();
        }

        function completeQuest(id) {
            if (!hunter.dailyProtocol) return;
            const quest = hunter.dailyProtocol.quests.find(q => q.id === id);
            if (!quest || quest.completed) return;

            if (hunter.fatigue > 75 && quest.category !== 'recovery') {
                return showAlert("FATIGUE TOO HIGH<br>Complete a recovery quest first.", []);
            }

            // Apply fatigue
            hunter.fatigue = Math.min(100, Math.max(0, hunter.fatigue + quest.fatigue));

            // Rewards
            addXP(quest.rewards.xp);
            hunter.gold += quest.rewards.gold;
            if (quest.rewards.stat) hunter.stats[quest.rewards.stat] += 1;

            quest.completed = true;

            // Streak & Discipline
            if (hunter.dailyProtocol.quests.every(q => q.completed)) {
                hunter.streak++;
                hunter.discipline = Math.min(100, hunter.discipline + 8);
            }

            showAlert(`QUEST CLEARED<br><span style="color:#00ffcc">${quest.name}</span>`, [
                {icon:'⭐', value: '+'+quest.rewards.xp, label:'XP'},
                {icon:'🪙', value: '+'+quest.rewards.gold, label:'GOLD'}
            ]);

            saveData();
            updateUI();
        }

        function updateUI() {
            // Basic info
            document.getElementById('levelDisplay').textContent = hunter.level;
            document.getElementById('rankDisplay').textContent = hunter.rank + "-RANK";
            document.getElementById('jobDisplay').textContent = hunter.job;
            document.getElementById('goldDisplay').textContent = hunter.gold;
            document.getElementById('streakDisplay').textContent = hunter.streak;
            document.getElementById('disciplineDisplay').textContent = hunter.discipline;
            document.getElementById('apValue').textContent = hunter.ap;

            // XP
            const xpReq = getXPRequired(hunter.level);
            document.getElementById('xpBar').style.width = (hunter.xp / xpReq * 100) + '%';
            document.getElementById('xpText').textContent = `${hunter.xp} / ${xpReq} XP`;

            // Bars
            document.getElementById('hpBar').style.width = '100%';
            document.getElementById('hpText').textContent = `${hunter.hp}/${hunter.maxHp}`;
            document.getElementById('mpBar').style.width = '100%';
            document.getElementById('mpText').textContent = `${hunter.mp}/${hunter.maxMp}`;
            document.getElementById('fatigueBar').style.width = hunter.fatigue + '%';
            document.getElementById('fatigueText').textContent = `${hunter.fatigue}/100`;

            // Phase
            const phase = getCurrentPhase();
            const phaseEl = document.getElementById('phaseIndicator');
            phaseEl.textContent = phase.name;
            phaseEl.style.color = phase.color;
            phaseEl.style.border = `1px solid ${phase.color}`;

            // Stats
            const statsHTML = Object.entries(hunter.stats).map(([key, val]) => `
                <div class="stat-row" style="background:rgba(10,25,50,0.6); padding:12px 16px; border-radius:6px; border:1px solid rgba(0,240,255,0.2);">
                    <div style="font-weight:600; letter-spacing:1px;">${key.toUpperCase()}</div>
                    <div style="font-family:Orbitron; color:var(--system-blue); font-size:1.25rem;">${val}</div>
                </div>
            `).join('');
            document.getElementById('statsContainer').innerHTML = statsHTML;

            // Protocol
            if (hunter.dailyProtocol) {
                let html = '';
                hunter.dailyProtocol.quests.forEach(quest => {
                    const completed = quest.completed;
                    html += `
                        <div class="quest-card" style="background:rgba(10,20,45,0.8); border:1px solid ${completed ? '#00ffcc' : '#00f0ff'}; margin-bottom:12px; padding:14px; border-radius:8px;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div style="font-weight:600;">${quest.name}</div>
                                <div style="font-size:0.75rem; padding:2px 8px; border-radius:4px; background:${completed ? 'rgba(0,255,204,0.2)' : 'rgba(0,240,255,0.15)'}; color:${completed ? '#00ffcc' : '#00f0ff'}">
                                    ${completed ? 'COMPLETED' : quest.category.toUpperCase()}
                                </div>
                            </div>
                            <div style="margin:8px 0; opacity:0.8; font-size:0.9rem;">Target: ${quest.target}</div>
                            ${!completed ? `<button onclick="completeQuest(${quest.id})" class="btn-system" style="width:100%; padding:10px; margin-top:8px; background:rgba(0,240,255,0.15); border:1px solid #00f0ff;">COMPLETE QUEST</button>` : ''}
                        </div>
                    `;
                });
                document.getElementById('protocolContainer').innerHTML = html;
            }

            // Fatigue warning
            document.getElementById('fatigueWarning').style.display = hunter.fatigue > 75 ? 'block' : 'none';
        }

        function showAlert(title, rewards = []) {
            const overlay = document.getElementById('modalOverlay');
            const alertBox = document.getElementById('systemAlert');
            
            let rewardHTML = '';
            if (rewards.length) {
                rewardHTML = `<div style="display:flex; justify-content:center; gap:25px; margin:20px 0;">` +
                    rewards.map(r => `
                        <div style="text-align:center;">
                            <div style="font-size:2.2rem;">${r.icon}</div>
                            <div style="font-family:Orbitron; font-size:1.3rem; color:#00ffcc;">${r.value}</div>
                            <div style="font-size:0.75rem; opacity:0.7;">${r.label}</div>
                        </div>
                    `).join('') + `</div>`;
            }

            alertBox.innerHTML = `
                <div style="font-family:Orbitron; font-size:1.6rem; margin-bottom:15px; color:#00f0ff;">${title}</div>
                ${rewardHTML}
                <button onclick="closeAlert()" style="width:100%; padding:14px; background:rgba(0,240,255,0.2); border:1px solid #00f0ff; color:white; font-family:Orbitron; letter-spacing:1px; margin-top:15px;">CONFIRM</button>
            `;
            overlay.style.display = 'flex';
        }

        function closeAlert() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function openGoldModal() {
            const amount = prompt("Enter new Gold amount:", hunter.gold);
            if (amount !== null) {
                hunter.gold = parseInt(amount) || 0;
                saveData();
                updateUI();
            }
        }

        // Initialize
        function init() {
            loadData();
            updateUI();

            // Auto daily reset
            const today = new Date().toDateString();
            if (!hunter.lastReset || hunter.lastReset !== today) {
                hunter.fatigue = Math.max(0, hunter.fatigue - 35);
                hunter.lastReset = today;
                if (!hunter.dailyProtocol) generateDailyProtocol();
            }

            // Keyboard shortcut for level up (dev)
            document.addEventListener('keydown', e => {
                if (e.ctrlKey && e.key === 'l') {
                    addXP(500);
                    e.preventDefault();
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
