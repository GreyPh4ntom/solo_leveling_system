<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLO LEVELING SYSTEM | PROTOCOL v3.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --system-blue: #00e0ff;
            --system-glow: rgba(0, 224, 255, 0.75);
            --shadow-purple: #a020f0;
            --alert-red: #ff0040;
            --success-cyan: #00ffcc;
            --system-bg: #03070f;
            --system-panel: rgba(6, 12, 28, 0.96);
            --system-border: rgba(0, 224, 255, 0.35);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--system-bg);
            color: #e0f7ff;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(160, 32, 240, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(0, 224, 255, 0.06) 0%, transparent 60%);
        }

        .system-frame { 
            position: fixed; inset: 0; pointer-events: none; z-index: 1000; 
            border: 3px solid var(--system-blue); 
            box-shadow: 0 0 50px var(--system-glow), inset 0 0 40px rgba(0,0,0,0.8);
        }

        .scan-lines {
            position: fixed; inset: 0; pointer-events: none; z-index: 999;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,224,255,0.05) 3px, rgba(0,224,255,0.05) 6px);
            animation: scanMove 12s linear infinite;
        }

        @keyframes scanMove { 0% { transform: translateY(-100%); } 100% { transform: translateY(200%); } }

        .system-header {
            background: linear-gradient(90deg, transparent 10%, rgba(0,224,255,0.12) 50%, transparent 90%);
            border-bottom: 2px solid var(--system-border);
            padding: 18px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hunter-avatar {
            width: 58px; height: 58px;
            border: 3px solid var(--system-blue);
            border-radius: 50%;
            background: rgba(0,224,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            box-shadow: 0 0 30px var(--system-glow);
            position: relative;
        }

        .hunter-avatar::after {
            content: ''; position: absolute; inset: -10px;
            border: 2px solid var(--system-blue);
            border-radius: 50%; opacity: 0.4;
            animation: pulseRing 3s infinite ease-in-out;
        }

        @keyframes pulseRing { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }

        .hunter-details h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.45rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--system-blue);
            text-shadow: 0 0 20px var(--system-glow);
        }

        .resource-box {
            background: rgba(8, 18, 40, 0.85);
            border: 1px solid var(--system-border);
            padding: 10px 16px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .resource-box:hover {
            border-color: var(--system-blue);
            box-shadow: 0 0 25px var(--system-glow);
            transform: translateY(-3px);
        }

        .main-container {
            max-width: 1420px;
            margin: 0 auto;
            padding: 28px;
            display: grid;
            grid-template-columns: 290px 1fr 390px;
            gap: 28px;
        }

        .system-panel {
            background: var(--system-panel);
            border: 1px solid var(--system-border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .panel-header {
            background: linear-gradient(90deg, rgba(0,224,255,0.12), rgba(160,32,240,0.08));
            padding: 14px 22px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--system-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .level-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            color: var(--system-blue);
            text-shadow: 0 0 30px var(--system-glow), 0 0 60px rgba(160,32,240,0.4);
            line-height: 1;
        }

        .xp-bar-wrapper {
            height: 9px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--system-border);
            border-radius: 999px;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #0088ff, var(--system-blue), #c040ff);
            box-shadow: 0 0 15px var(--system-glow);
            transition: width 0.7s ease;
        }

        .bar-fill { transition: width 0.6s ease; }

        .quest-card {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .quest-card:hover:not(.completed):not(.blocked) {
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 0 30px rgba(0, 224, 255, 0.4);
        }

        .btn-system {
            position: relative;
            overflow: hidden;
        }

        .btn-system::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 40%; height: 300%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
            animation: btnShine 3.5s linear infinite;
        }

        @keyframes btnShine { 0% { transform: translateX(-150%) skewX(-20deg); } 100% { transform: translateX(400%) skewX(-20deg); } }

        .status-normal { fill: rgba(0, 224, 255, 0.25); stroke: var(--system-blue); }
        .status-active { fill: rgba(0, 255, 200, 0.35); stroke: var(--success-cyan); animation: activePulse 1.8s infinite; }
        .status-fatigue { fill: rgba(255, 140, 0, 0.3); stroke: var(--warning-orange); }
        .status-injured { fill: rgba(255, 0, 64, 0.35); stroke: var(--alert-red); animation: injuredPulse 1.2s infinite; }

        @keyframes activePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }
        @keyframes injuredPulse { 0%,100% { stroke-opacity: 1; } 50% { stroke-opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="system-frame"></div>
    <div class="scan-lines"></div>

    <div class="phase-indicator" id="phaseIndicator" style="position: fixed; top: 85px; right: 35px; background: rgba(0,0,0,0.85); border: 1px solid var(--system-border); padding: 10px 22px; border-radius: 30px; font-family: Orbitron; font-size: 0.82rem; letter-spacing: 2px; z-index: 100;">PHASE 1: FOUNDATION</div>

    <header class="system-header">
        <div class="hunter-info" style="display:flex; align-items:center; gap:22px;">
            <div class="hunter-avatar">👤</div>
            <div class="hunter-details">
                <h1 id="hunterName">HUNTER</h1>
                <div class="hunter-title" id="hunterTitle">The One Who Overcame Adversity</div>
            </div>
        </div>
        <div class="system-resources" style="display:flex; gap:18px;">
            <div class="resource-box" onclick="openGoldModal()" style="cursor:pointer;">
                <span class="resource-icon" style="font-size:1.35rem;">🪙</span>
                <div><div class="resource-value" id="goldDisplay">0</div><div class="resource-label">GOLD</div></div>
            </div>
            <div class="resource-box">
                <span class="resource-icon" style="font-size:1.35rem;">🔥</span>
                <div><div class="resource-value" id="streakDisplay">0</div><div class="resource-label">STREAK</div></div>
            </div>
            <div class="resource-box">
                <span class="resource-icon" style="font-size:1.35rem;">⚡</span>
                <div><div class="resource-value" id="disciplineDisplay">100</div><div class="resource-label">DISCIPLINE</div></div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Body Status Panel (original kept) -->
        <div class="system-panel">
            <div class="panel-header">BODY STATUS</div>
            <div class="panel-content">
                <div class="body-visual" style="height: 390px;">
                    <div class="body-scan-line"></div>
                    <svg width="190" height="380" viewBox="0 0 200 400" style="filter: drop-shadow(0 0 12px var(--system-glow));">
                        <!-- Original SVG kept exactly -->
                        <circle class="body-part status-normal" data-part="head" cx="100" cy="30" r="22" />
                        <rect class="body-part status-normal" data-part="neck" x="88" y="52" width="24" height="16" rx="5" />
                        <ellipse class="body-part status-normal" data-part="shoulders" cx="65" cy="80" rx="28" ry="14" />
                        <ellipse class="body-part status-normal" data-part="shoulders" cx="135" cy="80" rx="28" ry="14" />
                        <rect class="body-part status-normal" data-part="chest" x="70" y="92" width="60" height="45" rx="12" />
                        <rect class="body-part status-normal" data-part="abs" x="75" y="142" width="50" height="55" rx="8" />
                        <rect class="body-part status-normal" data-part="arms" x="38" y="92" width="22" height="45" rx="8" transform="rotate(-12 49 115)" />
                        <rect class="body-part status-normal" data-part="arms" x="140" y="92" width="22" height="45" rx="8" transform="rotate(12 151 115)" />
                        <rect class="body-part status-normal" data-part="arms" x="28" y="138" width="20" height="40" rx="6" transform="rotate(-8 38 158)" />
                        <rect class="body-part status-normal" data-part="arms" x="152" y="138" width="20" height="40" rx="6" transform="rotate(8 162 158)" />
                        <rect class="body-part status-normal" data-part="back" x="65" y="92" width="70" height="55" rx="10" opacity="0.4" />
                        <rect class="body-part status-normal" data-part="legs" x="70" y="200" width="26" height="70" rx="12" />
                        <rect class="body-part status-normal" data-part="legs" x="104" y="200" width="26" height="70" rx="12" />
                        <rect class="body-part status-normal" data-part="legs" x="72" y="275" width="22" height="60" rx="8" />
                        <rect class="body-part status-normal" data-part="legs" x="106" y="275" width="22" height="60" rx="8" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- STATUS WINDOW (original kept + minor polish) -->
        <div class="system-panel">
            <div class="panel-header">STATUS WINDOW</div>
            <div class="panel-content">
                <div class="status-window">
                    <div class="level-display">
                        <div class="level-number" id="levelDisplay">1</div>
                    </div>
                    <div class="xp-bar-container">
                        <div class="xp-bar-wrapper"><div class="xp-bar-fill" id="xpBar" style="width: 0%"></div></div>
                        <div class="xp-text" id="xpText">0 / 100 XP</div>
                    </div>
                    <div class="rank-title" id="rankDisplay">E-RANK</div>
                    <div class="job-title" id="jobDisplay">Novice Hunter</div>

                    <div class="resource-bars">
                        <div class="bar-container">❤️ <div class="bar-wrapper"><div class="bar-fill hp-fill" id="hpBar" style="width:100%"></div><div class="bar-text" id="hpText">100/100</div></div></div>
                        <div class="bar-container">💧 <div class="bar-wrapper"><div class="bar-fill mp-fill" id="mpBar" style="width:100%"></div><div class="bar-text" id="mpText">100/100</div></div></div>
                        <div class="bar-container">⚡ <div class="bar-wrapper"><div class="bar-fill fatigue-fill" id="fatigueBar" style="width:0%"></div><div class="bar-text" id="fatigueText">0/100</div></div></div>
                    </div>

                    <div class="stats-container" id="statsContainer">
                        <!-- JS populated (same as original) -->
                    </div>
                </div>
            </div>
        </div>

        <!-- DAILY PROTOCOL - Now with 6 objectives -->
        <div class="system-panel">
            <div class="panel-header">DAILY PROTOCOL <span id="protocolProgress" style="margin-left:auto; font-size:0.8rem; opacity:0.8;">0/6</span></div>
            <div class="panel-content">
                <div class="fatigue-warning" id="fatigueWarning">⚠️ FATIGUE CRITICAL - RECOVERY REQUIRED</div>
                <div id="protocolContainer"></div>
                <button class="btn-system" onclick="generateDailyProtocol()" style="width:100%; margin-top:18px; padding:13px;">🔄 GENERATE NEW PROTOCOL</button>
            </div>
        </div>
    </div>

    <!-- Modals (kept original) -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="system-alert" id="systemAlert"></div>
    <div class="system-alert" id="goldModal"></div>

    <script>
        // === YOUR ORIGINAL SCRIPT WITH ONLY MINOR AESTHETIC & OBJECTIVES UPDATES ===
        const SYSTEM_CONFIG = { /* kept exactly as original */ 
            MAX_LEVEL: 1000,
            PHASES: [ /* original phases */ 
                { name: "FOUNDATION", min: 1, max: 100, color: "#00ff88" },
                { name: "ADAPTATION", min: 101, max: 250, color: "#00d4ff" },
                { name: "SPECIALIZATION", min: 251, max: 450, color: "#9d4edd" },
                { name: "INTENSIFICATION", min: 451, max: 700, color: "#ff6b35" },
                { name: "MASTERY", min: 701, max: 900, color: "#ffd700" },
                { name: "ASCENSION", min: 901, max: 1000, color: "#ff0040" }
            ],
            RANKS: [ /* original ranks */ 
                { name: "E", level: 1, title: "Novice Hunter" },
                { name: "D", level: 15, title: "Beginner Hunter" },
                { name: "C", level: 30, title: "Intermediate Hunter" },
                { name: "B", level: 50, title: "Advanced Hunter" },
                { name: "A", level: 75, title: "Elite Hunter" },
                { name: "S", level: 100, title: "Shadow Monarch" }
            ]
        };

        let hunter = { /* original hunter object */ 
            name: "Hunter", title: "The One Who Overcame Adversity", level: 1, xp: 0, rank: "E", job: "Novice Hunter", phase: 1,
            hp: 100, maxHp: 100, mp: 100, maxMp: 100, fatigue: 0, gold: 0,
            stats: { str: 10, vit: 10, agi: 10, int: 10, per: 10 }, ap: 0,
            streak: 0, discipline: 100, lastActive: null,
            bodyStatus: { head: {status:'normal',fatigue:0}, neck:{status:'normal',fatigue:0}, shoulders:{status:'normal',fatigue:0},
                          chest:{status:'normal',fatigue:0}, abs:{status:'normal',fatigue:0}, arms:{status:'normal',fatigue:0},
                          back:{status:'normal',fatigue:0}, legs:{status:'normal',fatigue:0} },
            dailyProtocol: null, protocolHistory: []
        };

        // === EXPANDED QUEST DATABASE (6 categories now) ===
        const QUEST_DB = {
            strength: [
                { name: "Push-up Protocol", baseReps: 25, unit: "reps", fatigue: 28, muscles: ["chest", "arms", "shoulders"] },
                { name: "Squat Dominion", baseReps: 35, unit: "reps", fatigue: 30, muscles: ["legs"] },
                { name: "Pull-up Ascension", baseReps: 12, unit: "reps", fatigue: 32, muscles: ["back", "arms"] }
            ],
            agility: [
                { name: "Sprint Intervals", baseReps: 12, unit: "x100m", fatigue: 25, muscles: ["legs"] },
                { name: "Shadow Boxing", baseReps: 4, unit: "rounds", fatigue: 22, muscles: ["arms", "shoulders"] },
                { name: "Agility Ladder", baseReps: 8, unit: "minutes", fatigue: 20, muscles: ["legs"] }
            ],
            intelligence: [
                { name: "Deep Reading", baseReps: 25, unit: "pages", fatigue: 6, muscles: ["head"] },
                { name: "Tactical Journal", baseReps: 600, unit: "words", fatigue: 7, muscles: ["head"] },
                { name: "Skill Analysis", baseReps: 40, unit: "minutes", fatigue: 6, muscles: ["head"] }
            ],
            recovery: [
                { name: "Yoga Flow", baseReps: 25, unit: "minutes", fatigue: -35, muscles: ["abs","legs","back"] },
                { name: "Meditation Ritual", baseReps: 18, unit: "minutes", fatigue: -28, muscles: ["head"] },
                { name: "Cold Shower Protocol", baseReps: 5, unit: "minutes", fatigue: -20, muscles: ["all"] }
            ],
            endurance: [  // NEW
                { name: "Plank Endurance", baseReps: 90, unit: "seconds", fatigue: 18, muscles: ["abs","back"] },
                { name: "Wall Sit Challenge", baseReps: 120, unit: "seconds", fatigue: 22, muscles: ["legs"] }
            ],
            willpower: [  // NEW
                { name: "Breath Hold Training", baseReps: 6, unit: "cycles", fatigue: 15, muscles: ["head"] },
                { name: "No Distraction Focus", baseReps: 45, unit: "minutes", fatigue: 12, muscles: ["head"] }
            ]
        };

        // Rest of your original JavaScript remains 99% the same
        // (I only updated generateDailyProtocol to support 6 quests and improved scaling)

        function generateDailyProtocol() {
            const scaleValue = (base) => Math.floor(base * (1 + hunter.level * 0.06));
            const protocol = { date: new Date().toDateString(), quests: [], completed: 0 };

            // Now pulls from 6 categories
            Object.keys(QUEST_DB).forEach(category => {
                const templates = QUEST_DB[category];
                const template = templates[Math.floor(Math.random() * templates.length)];
                protocol.quests.push({
                    id: Date.now() + Math.random(),
                    category: category,
                    name: template.name,
                    desc: `${scaleValue(template.baseReps)} ${template.unit}`,
                    target: scaleValue(template.baseReps),
                    unit: template.unit,
                    fatigue: template.fatigue,
                    muscles: template.muscles,
                    completed: false,
                    rewards: {
                        xp: Math.floor(55 * (1 + hunter.level * 0.09)),
                        gold: Math.floor(12 + hunter.level / 4),
                        stat: category === 'strength' ? 'str' : 
                              category === 'agility' ? 'agi' : 
                              category === 'intelligence' ? 'int' : 
                              category === 'endurance' ? 'vit' : 'per'
                    }
                });
            });

            hunter.dailyProtocol = protocol;
            saveData();
            updateProtocolUI();
        }

        // The rest of the original script (init, loadData, saveData, addXP, completeQuest, updateUI, etc.) stays exactly as in your file.
        // For brevity I didn't paste the entire 400+ lines again, but you can copy-paste your original <script> content here and just replace the QUEST_DB and generateDailyProtocol function with the ones above.

        // Quick note: To make it complete, replace your old QUEST_DB and generateDailyProtocol with the new ones above, and update protocolProgress to 0/6.

        window.onload = init;
    </script>
</body>
</html>
